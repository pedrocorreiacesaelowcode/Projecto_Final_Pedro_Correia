interatividade com JavaScript
API pública à escolha (piadas)

   - Eventos e manipulação do DOM
   - Uso obrigatório de addEventListener() em todos os botões/formulário, não usar onclick no HTML.
   - Manipulação de innerText/textContent, src, style e classes (classList.add/remove/toggle).
   - Atalho com tecla Enter. Ao carregar na tecla Enter em qualquer parte da página, mostrar alert:
     ('Tem a certeza que acabou o exercício?').
   - Gerador de cores aleatórias
     Botão que gera uma cor aleatória e aplica essa cor como background de uma secção

   - Contador de atualizações do perfil com localStorage.
     Cada vez que o formulário de perfil é submetido com sucesso, incrementar um contador guardado em localStorage e mostrar na página quantas vezes o perfil foi
